<body>

<div class="header">
  <h1>Logs</h1>
  <input type="checkbox" id="nav-toggle" style="display:none">
  <label for="nav-toggle" class="nav-hamburger" aria-label="Menu de navegação"><span></span><span></span><span></span></label>
  <div class="nav-links">
    <a href="/conversas">Conversas</a>
    <a href="/chat">Chat</a>
    <a href="/agentes">Agentes</a>
    <a href="/ferramentas">Ferramentas</a>
    <a href="/mcp-admin">MCP</a>
    <a href="/databases">Databases</a>
    <a href="/conhecimento">Conhecimento</a>
    <a href="/relatorios">Relatórios</a>
    <a href="/config">Config</a>
    <span id="auth-user" style="display:none"></span>
    <a href="#" id="logout-link" style="display:none" onclick="doLogout();return false;">Sair</a>
  </div>
</div>

<div class="container">
  <div class="banner" id="banner">
    Modo debug desativado. Ative na página de configuração para ver logs detalhados.
  </div>

  <div class="filters">
    <label style="font-size:11px;color:var(--text-muted);white-space:nowrap;">Evento:</label>
    <select id="filter-event">
      <option value="">Todos os eventos</option>
      <option disabled>── Main ──</option>
      <option value="main_whatsapp_msg_received">main_whatsapp_msg_received (msg recebida)</option>
      <option value="main_debounce_fire">main_debounce_fire (debounce disparado)</option>
      <option disabled>── Pipeline ──</option>
      <option value="pipeline_guardrail_blocked">pipeline_guardrail_blocked (bloqueado)</option>
      <option value="pipeline_session_new">pipeline_session_new (nova sessão)</option>
      <option value="pipeline_session_summarized">pipeline_session_summarized (sessão resumida)</option>
      <option value="pipeline_rag_search">pipeline_rag_search (busca RAG)</option>
      <option value="pipeline_rag_empty_context">pipeline_rag_empty_context (RAG vazio)</option>
      <option value="pipeline_context_compacted">pipeline_context_compacted (contexto compactado)</option>
      <option value="pipeline_ai_request">pipeline_ai_request (chamada à IA)</option>
      <option value="pipeline_ai_response">pipeline_ai_response (resposta da IA)</option>
      <option value="pipeline_agent_chain">pipeline_agent_chain (encadeamento)</option>
      <option value="pipeline_msg_sent">pipeline_msg_sent (msg enviada)</option>
      <option disabled>── AI ──</option>
      <option value="ai_llm_request">ai_llm_request (requisição LLM)</option>
      <option value="ai_llm_response">ai_llm_response (resposta LLM)</option>
      <option value="ai_tool_call">ai_tool_call (chamada de tool)</option>
      <option value="ai_tool_result">ai_tool_result (resultado de tool)</option>
      <option disabled>── RAG ──</option>
      <option value="rag_fts_search">rag_fts_search (busca textual)</option>
      <option value="rag_embedding_search">rag_embedding_search (busca semântica)</option>
      <option value="rag_hybrid_search">rag_hybrid_search (busca híbrida)</option>
      <option disabled>── Guardrails ──</option>
      <option value="guardrail_check_input">guardrail_check_input (verificar entrada)</option>
      <option value="guardrail_check_output">guardrail_check_output (verificar saída)</option>
      <option disabled>── Tools ──</option>
      <option value="tools_tool_execute">tools_tool_execute (executar tool)</option>
      <option value="tools_tool_execute_result">tools_tool_execute_result (resultado tool)</option>
      <option value="tools_scheduled_sent">tools_scheduled_sent (agendada enviada)</option>
      <option value="tools_mcp_connect_error">tools_mcp_connect_error (erro MCP)</option>
      <option value="tools_extdb_connect_error">tools_extdb_connect_error (erro banco ext.)</option>
      <option disabled>── Web ──</option>
      <option value="web_config_saved">web_config_saved (config salva)</option>
      <option value="web_whatsapp_logout">web_whatsapp_logout (WhatsApp logout)</option>
      <option value="web_chat_cleared">web_chat_cleared (chat limpo)</option>
      <option value="web_report_cleared">web_report_cleared (relatório limpo)</option>
      <option value="web_knowledge_created">web_knowledge_created (conhecimento criado)</option>
      <option value="web_knowledge_updated">web_knowledge_updated (conhecimento atualizado)</option>
      <option value="web_knowledge_deleted">web_knowledge_deleted (conhecimento excluído)</option>
      <option value="web_knowledge_processed">web_knowledge_processed (conhecimento processado)</option>
      <option value="web_knowledge_bulk_op">web_knowledge_bulk_op (operação em massa)</option>
      <option value="web_custom_tool_created">web_custom_tool_created (API criada)</option>
      <option value="web_custom_tool_updated">web_custom_tool_updated (API atualizada)</option>
      <option value="web_custom_tool_deleted">web_custom_tool_deleted (API excluída)</option>
      <option value="web_mcp_server_created">web_mcp_server_created (MCP criado)</option>
      <option value="web_mcp_server_updated">web_mcp_server_updated (MCP atualizado)</option>
      <option value="web_mcp_server_deleted">web_mcp_server_deleted (MCP excluído)</option>
      <option value="web_extdb_created">web_extdb_created (banco criado)</option>
      <option value="web_extdb_updated">web_extdb_updated (banco atualizado)</option>
      <option value="web_extdb_deleted">web_extdb_deleted (banco excluído)</option>
      <option value="web_agent_created">web_agent_created (agente criado)</option>
      <option value="web_agent_updated">web_agent_updated (agente atualizado)</option>
      <option value="web_agent_deleted">web_agent_deleted (agente excluído)</option>
      <option value="web_agent_routing_changed">web_agent_routing_changed (routing alterado)</option>
      <option disabled>── Auth ──</option>
      <option value="auth_login_ok">auth_login_ok (login OK)</option>
      <option value="auth_login_failed">auth_login_failed (login falhou)</option>
      <option value="auth_logout">auth_logout (logout)</option>
      <option value="auth_user_created">auth_user_created (usuário criado)</option>
      <option value="auth_user_role_changed">auth_user_role_changed (papel alterado)</option>
      <option value="auth_user_deleted">auth_user_deleted (usuário excluído)</option>
      <option disabled>── WhatsApp ──</option>
      <option value="whatsapp_connected">whatsapp_connected (conectado)</option>
      <option value="whatsapp_disconnected">whatsapp_disconnected (desconectado)</option>
      <option disabled>── Outros ──</option>
      <option value="error">error (erro geral)</option>
    </select>
    <label style="font-size:11px;color:var(--text-muted);white-space:nowrap;">Chat:</label>
    <input type="text" id="filter-phone" placeholder="Chat ID...">
    <label style="font-size:11px;color:var(--text-muted);white-space:nowrap;">Limite:</label>
    <input type="number" id="filter-limit" value="100" min="10" max="1000" class="select-inline">
    <button class="btn" onclick="loadLogs()">Filtrar</button>
    <span style="flex:1;"></span>
    <button class="btn btn-danger" onclick="clearLogs()">Limpar Logs</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Hora</th>
          <th>Evento</th>
          <th>Chat ID</th>
          <th>Dados</th>
        </tr>
      </thead>
      <tbody id="log-body">
        <tr><td colspan="4" class="empty">Carregando...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
function formatTime(ts) {
  return new Date(ts * 1000).toLocaleString('pt-BR', {
    day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit'
  });
}

function formatData(data) {
  if (!data || Object.keys(data).length === 0) return '<span style="color:#d1d5db">—</span>';
  const pretty = JSON.stringify(data, null, 2);
  const preview = JSON.stringify(data).substring(0, 60).replace(/</g, '&lt;').replace(/>/g, '&gt;');
  const hasMore = JSON.stringify(data).length > 60;
  const prettyEsc = pretty.replace(/</g, '&lt;').replace(/>/g, '&gt;');
  return `<span class="preview">${preview}${hasMore ? '<span class="expand-hint">&#9660;</span>' : ''}</span><pre>${prettyEsc}</pre>`;
}

let expandedRow = -1;

function toggleData(cell) {
  const row = cell.closest('tr');
  const tbody = document.getElementById('log-body');
  const idx = Array.from(tbody.rows).indexOf(row);
  if (expandedRow === idx) {
    cell.classList.remove('expanded');
    expandedRow = -1;
  } else {
    document.querySelectorAll('.data-cell.expanded').forEach(c => c.classList.remove('expanded'));
    cell.classList.add('expanded');
    expandedRow = idx;
  }
}

function restoreExpanded() {
  if (expandedRow < 0) return;
  const tbody = document.getElementById('log-body');
  const row = tbody.rows[expandedRow];
  if (row) row.querySelector('.data-cell')?.classList.add('expanded');
}

async function apiFetch(url, opts) {
  const r = await fetch(url, opts);
  if (r.status === 401) { location.href = '/login'; return null; }
  if (r.status === 403) { return null; }
  return r;
}
async function getError(r) {
  try { const d = await r.json(); return d.error || 'Erro desconhecido'; }
  catch(e) { return 'Erro desconhecido'; }
}
async function doLogout() { await fetch('/api/logout', {method:'POST'}); location.href = '/login'; }

async function checkDebug() {
  try {
    const r = await apiFetch('/api/config');
    if (!r) return;
    const cfg = await r.json();
    document.getElementById('banner').style.display = cfg.debug ? 'none' : 'block';
  } catch(e) {}
}

async function clearLogs() {
  if (!confirm('Limpar todos os logs?')) return;
  try {
    await fetch('/api/logs', {method:'DELETE'});
    loadLogs();
  } catch(e) {}
}

async function loadLogs() {
  const event = document.getElementById('filter-event').value;
  const chatID = document.getElementById('filter-phone').value;
  const limit = document.getElementById('filter-limit').value;

  let url = '/api/logs?limit=' + limit;
  if (event) url += '&event=' + encodeURIComponent(event);
  if (chatID) url += '&chat_id=' + encodeURIComponent(chatID);

  try {
    const r = await apiFetch(url);
    if (!r) return;
    const logs = await r.json();
    const body = document.getElementById('log-body');

    if (!logs.length) {
      body.innerHTML = '<tr><td colspan="4" class="empty">Nenhum log encontrado</td></tr>';
      return;
    }

    body.innerHTML = logs.map(l => `
      <tr>
        <td>${formatTime(l.created_at)}</td>
        <td><span class="event-badge ${l.event}">${l.event}</span></td>
        <td>${l.chat_id ? (l.chat_id.includes('@') ? l.chat_id : '+' + l.chat_id) : '<span style="color:#d1d5db">—</span>'}</td>
        <td class="data-cell" onclick="toggleData(this)">${formatData(l.data)}</td>
      </tr>
    `).join('');
    restoreExpanded();
  } catch(e) { console.error(e); }
}

checkDebug();
loadLogs();
setInterval(loadLogs, 10000);

fetch('/api/auth/status').then(r=>r.json()).then(d=>{
  if(d.enabled&&d.user){
    document.getElementById('auth-user').textContent=d.user.username;
    document.getElementById('auth-user').style.display='';
    document.getElementById('logout-link').style.display='';
  }
}).catch(()=>{});
</script>
</body>
</html>
